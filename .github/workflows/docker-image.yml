name: Build Docker Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      delivery_mode:
        description: Output mode
        required: true
        type: choice
        default: tar
        options:
          - tar
          - registry
          - both
      registry_url:
        description: Internal registry URL (for registry/both)
        required: false
        default: ""
      image_name:
        description: Image name/path
        required: false
        default: auditforge
      image_tag:
        description: Image tag
        required: false
        default: latest
      artifact_name:
        description: Tar artifact name
        required: false
        default: auditforge-image

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.image_name || 'auditforge' }}
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || github.sha }}
  ARTIFACT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_name || format('auditforge-{0}', github.sha) }}
  DELIVERY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.delivery_mode || 'tar' }}

jobs:
  tar:
    if: env.DELIVERY_MODE == 'tar' || env.DELIVERY_MODE == 'both'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          set -e
          docker build -f docker/Dockerfile -t "$IMAGE_NAME:$IMAGE_TAG" .

      - name: Save image archive
        run: |
          set -e
          mkdir -p dist
          docker save -o "dist/${ARTIFACT_NAME}.tar" "$IMAGE_NAME:$IMAGE_TAG"

      - name: Upload image archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/${{ env.ARTIFACT_NAME }}.tar
          if-no-files-found: error
          retention-days: 30

  registry:
    if: env.DELIVERY_MODE == 'registry' || env.DELIVERY_MODE == 'both'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate registry settings
        run: |
          set -e
          if [ -z "${{ github.event.inputs.registry_url }}" ]; then
            echo "registry_url is required for registry output mode"
            exit 1
          fi

      - name: Log in to internal registry
        uses: docker/login-action@v3
        with:
          registry: ${{ github.event.inputs.registry_url }}
          username: ${{ secrets.INTERNAL_REGISTRY_USERNAME }}
          password: ${{ secrets.INTERNAL_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ github.event.inputs.registry_url }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
