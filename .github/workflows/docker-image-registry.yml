name: Push Docker Image to Internal Registry

on:
  workflow_dispatch:
    inputs:
      registry_url:
        description: Internal registry URL (for example registry.local:5000)
        required: true
        default: ""
      image_name:
        description: Image name/path
        required: true
        default: auditforge
      image_tag:
        description: Image tag
        required: true
        default: latest

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to internal registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry_url }}
          username: ${{ secrets.INTERNAL_REGISTRY_USERNAME }}
          password: ${{ secrets.INTERNAL_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ inputs.registry_url }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max