version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-auditforge}
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - '3306:3306'

  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- -p 3000"
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-auditforge}
      SYNC_ENCRYPTION_KEY: ${SYNC_ENCRYPTION_KEY}
      STORAGE_SOURCE_CONFIG_FILE: ${STORAGE_SOURCE_CONFIG_FILE:-}
      STORAGE_SOURCE_CONFIG_JSON: ${STORAGE_SOURCE_CONFIG_JSON:-}
    depends_on:
      - db
