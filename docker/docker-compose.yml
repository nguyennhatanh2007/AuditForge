version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-auditforge}
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - '3306:3306'

  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    depends_on:
      - db
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-auditforge}
      SYNC_ENCRYPTION_KEY: ${SYNC_ENCRYPTION_KEY}
    restart: unless-stopped

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
